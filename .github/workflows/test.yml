name: GdUnit4 Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run GdUnit4 Tests
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import Godot project
        run: |
          mkdir -p ~/.config/godot
          mkdir -p ~/.local/share/godot
          godot --headless --import --quit 2>/dev/null || true

      - name: Run unit tests
        shell: bash
        run: |
          # GdUnit4 runner hangs during finalization in headless mode after
          # all tests complete. Run it in background, monitor output for the
          # "Overall Summary" line, then kill the process and parse results.
          LOG=/tmp/gdunit_output.log
          > "$LOG"

          godot --headless --path . -s res://addons/gdUnit4/bin/GdUnitCmdTool.gd \
            --add tests/ \
            -c \
            --ignoreHeadlessMode \
            -rd res://reports > "$LOG" 2>&1 &
          GODOT_PID=$!

          # Wait up to 10 minutes for tests to complete
          TIMEOUT=600
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            if ! kill -0 $GODOT_PID 2>/dev/null; then
              # Process exited on its own
              break
            fi
            if grep -q "Overall Summary:" "$LOG" 2>/dev/null; then
              # Tests finished, give it a moment to flush output
              sleep 2
              break
            fi
            sleep 1
            ELAPSED=$((ELAPSED + 1))
          done

          # Kill godot if still running (finalization hang)
          if kill -0 $GODOT_PID 2>/dev/null; then
            kill $GODOT_PID 2>/dev/null
            wait $GODOT_PID 2>/dev/null || true
          fi

          # Display the test output
          cat "$LOG"

          # Parse results from the Overall Summary line
          if ! grep -q "Overall Summary:" "$LOG"; then
            echo "ERROR: Tests did not complete within ${TIMEOUT}s"
            exit 1
          fi

          SUMMARY=$(grep "Overall Summary:" "$LOG" | sed 's/\x1b\[[0-9;]*m//g')
          echo ""
          echo "=== $SUMMARY ==="

          # Check for failures or errors
          if echo "$SUMMARY" | grep -qE '[1-9][0-9]* (failures|errors)'; then
            echo "FAILED: Test failures or errors detected"
            exit 1
          fi

          # Also check for individual FAILED test markers
          if grep -q 'FAILED' "$LOG"; then
            echo "FAILED: Individual test failures detected:"
            grep 'FAILED' "$LOG" | sed 's/\x1b\[[0-9;]*m//g'
            exit 1
          fi

          echo "All tests passed."
          exit 0

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: reports/
          retention-days: 14
