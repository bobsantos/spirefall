name: GdUnit4 Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run GdUnit4 Tests
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import Godot project
        run: |
          mkdir -p ~/.config/godot
          mkdir -p ~/.local/share/godot
          godot --headless --import --quit 2>/dev/null || true

      - name: Run unit tests
        run: |
          set +e
          # GdUnit4 runner may not exit cleanly in headless mode after all
          # tests complete. Use timeout to kill it after 5 minutes.
          # Capture stdout to verify results if timeout occurs.
          timeout 300 godot --headless --path . -s res://addons/gdUnit4/bin/GdUnitCmdTool.gd \
            --add tests/ \
            -c \
            --ignoreHeadlessMode \
            -rd res://reports 2>&1 | tee /tmp/gdunit_output.log
          EXIT_CODE=${PIPESTATUS[0]}

          # Exit 0 = all passed, 101 = orphan warnings only (not failures)
          if [ $EXIT_CODE -eq 0 ] || [ $EXIT_CODE -eq 101 ]; then
            exit 0
          fi

          # Exit 124 = timeout killed the process. This happens when GdUnit4
          # hangs during finalization after tests complete. Parse the captured
          # output to verify no test failures occurred.
          if [ $EXIT_CODE -eq 124 ]; then
            echo "GdUnit4 runner was killed by timeout (likely finalization hang)."
            echo "Checking test output for failures..."
            # Look for any per-suite Statistics line with failures > 0
            if grep -q '[0-9] failures' /tmp/gdunit_output.log; then
              FAILURE_LINES=$(grep '[1-9][0-9]* failures' /tmp/gdunit_output.log || true)
              if [ -n "$FAILURE_LINES" ]; then
                echo "Test failures found in output:"
                echo "$FAILURE_LINES"
                exit 1
              fi
            fi
            # Also check for FAILED markers on individual tests
            if grep -q 'FAILED' /tmp/gdunit_output.log; then
              echo "FAILED tests found in output:"
              grep 'FAILED' /tmp/gdunit_output.log
              exit 1
            fi
            echo "All test suites show 0 failures. Accepting timeout as success."
            exit 0
          fi

          # Any other exit code is a real failure
          exit $EXIT_CODE

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: reports/
          retention-days: 14
