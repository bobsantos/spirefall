name: GdUnit4 Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run GdUnit4 Tests
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import Godot project
        run: |
          mkdir -p ~/.config/godot
          mkdir -p ~/.local/share/godot
          godot --headless --import --quit 2>/dev/null || true

      - name: Run unit tests
        run: |
          set +e
          godot --headless --path . -s res://addons/gdUnit4/bin/GdUnitCmdTool.gd \
            --add tests/ \
            -c \
            --ignoreHeadlessMode \
            -rd res://reports
          EXIT_CODE=$?
          # Exit 0 = all passed, 101 = all passed with orphan warnings
          if [ $EXIT_CODE -eq 0 ] || [ $EXIT_CODE -eq 101 ]; then
            exit 0
          else
            exit $EXIT_CODE
          fi

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: reports/
          retention-days: 14
