<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>$GODOT_PROJECT_NAME</title>
	<style>
		html, body {
			margin: 0;
			padding: 0;
			border: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
			overscroll-behavior: none;
			background-color: #0a0a0f;
		}
		canvas {
			display: block;
			touch-action: none;
		}
		#canvas {
			width: 100%;
			height: 100%;
		}

		/* Loading overlay */
		#loading-overlay {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			background-color: #0a0a0f;
			z-index: 10;
			transition: opacity 0.4s ease-out;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
		}
		#loading-overlay.fade-out {
			opacity: 0;
			pointer-events: none;
		}

		#loading-title {
			font-size: clamp(28px, 6vw, 48px);
			font-weight: 700;
			color: #FFD700;
			letter-spacing: 0.15em;
			text-transform: uppercase;
			margin-bottom: 32px;
			text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
		}

		#loading-spinner {
			width: clamp(32px, 6vw, 44px);
			height: clamp(32px, 6vw, 44px);
			border: 3px solid rgba(255, 215, 0, 0.15);
			border-top-color: #FFD700;
			border-radius: 50%;
			animation: spin 0.8s linear infinite;
			margin-bottom: 28px;
		}
		@keyframes spin {
			to { transform: rotate(360deg); }
		}

		#loading-status {
			font-size: clamp(12px, 2.5vw, 14px);
			color: rgba(255, 215, 0, 0.55);
			letter-spacing: 0.05em;
		}

		/* Hidden legacy status elements */
		#status, #status-progress, #status-notice {
			display: none;
		}
	</style>
	$GODOT_HEAD_INCLUDE
</head>
<body>
	<canvas id="canvas"></canvas>

	<div id="loading-overlay">
		<div id="loading-title">Spirefall</div>
		<div id="loading-spinner"></div>
		<div id="loading-status">Loading...</div>
	</div>

	<div id="status">
		<div id="status-progress" style="display: none;"></div>
		<div id="status-notice" style="display: none;"></div>
	</div>

	<script src="$GODOT_URL"></script>
	<script>
		const overlay = document.getElementById('loading-overlay');
		const statusText = document.getElementById('loading-status');

		function hideOverlay() {
			overlay.classList.add('fade-out');
			setTimeout(function () {
				if (overlay.parentNode) overlay.remove();
			}, 500);
		}

		const engine = new Engine($GODOT_CONFIG);

		engine.startGame({
			'onProgress': function (current, total) {
				if (total > 0) {
					var pct = Math.round(Math.min((current / total) * 100, 100));
					statusText.textContent = 'Loading... ' + pct + '%';
				}
			}
		}).then(function () {
			hideOverlay();
		}).catch(function (err) {
			console.error('Engine start failed:', err);
			statusText.textContent = 'Error loading game';
			statusText.style.color = '#ff6b6b';
		});
	</script>
</body>
</html>
